<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEWA WA PANEL</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0b0b0b;
      color:white;
    }

    .container{
      padding:20px;
    }

    .card{
      background:#151515;
      border-radius:20px;
      padding:20px;
      margin-bottom:20px;
      border:1px solid #1f1f1f;
    }

    .title{
      font-size:30px;
      font-weight:bold;
      margin-bottom:10px;
    }

    .status{
      color:#25D366;
      font-weight:bold;
    }

    button{
      width:100%;
      padding:15px;
      border:none;
      border-radius:15px;
      background:#25D366;
      color:black;
      font-weight:bold;
      font-size:16px;
    }

    input{
      width:100%;
      padding:15px;
      margin-bottom:15px;
      border:none;
      border-radius:15px;
      background:#1c1c1c;
      color:white;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="card">
    <div class="title">SEWA WA PANEL</div>
    <div class="status">STATUS: OPEN</div>
  </div>

  <div class="card">
    <h3>Pengumuman</h3>
    <p>Selamat datang di layanan sewa WhatsApp.</p>
  </div>

  <div class="card">
    <h3>Form Sewa</h3>

    <input type="text" placeholder="Nomor WhatsApp">

    <input type="text" placeholder="E-Wallet">

    <input type="text" placeholder="Nomor E-Wallet">

    <input type="text" placeholder="Nama Pemilik">

    <button>KIRIM DATA</button>

  </div>

</div>

</body>
  </html>
